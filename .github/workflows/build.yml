name: Build Extension

on:
  push:
    branches: [main, develop]
    tags:
      - "v*"
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build extension
        run: npm run build-local

      - name: Minify CSS
        run: |
          npm install -g clean-css-cli
          cleancss src/style.css -o dist/style.css

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: splitify-build
          path: |
            dist/
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: splitify-build
          path: dist/

      - name: Create release folder structure
        run: |
          mkdir -p splitify-dist
          cp -r dist/* splitify-dist/
          cp README.md splitify-dist/
          cp icon.svg splitify-dist/
          cp icon-active.svg splitify-dist/

      - name: Create zip archive
        run: |
          zip -r splitify.zip splitify-dist/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: splitify.zip
          draft: false
          prerelease: false
